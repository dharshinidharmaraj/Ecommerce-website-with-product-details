<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Company Dashboard - Axis 3D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">
      AXIS 3D
    </div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html">Shop</a>
      <a href="dashboard.html">Dashboard</a>
    </nav>
    <button class="logout-btn" id="logoutBtn" style="display: none;">
      Logout
    </button>
  </header>

  <!-- LOGIN SECTION -->
  <div id="loginSection" class="login-container">
    <div class="login-box">
      <h2>Company Admin Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required placeholder="admin@axis3d.com">
        </div>
        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="login-btn">Login</button>
        <p id="loginError" class="error-message"></p>
      </form>
    </div>
  </div>

  <!-- DASHBOARD SECTION -->
  <div id="dashboardSection" class="dashboard-container" style="display: none;">
    <div class="dashboard-header">
      <h1>Product Analytics Dashboard</h1>
      <div class="dashboard-controls">
        <button id="refreshBtn" class="refresh-btn">Refresh Data</button>
      </div>
    </div>

    <div class="dashboard-stats">
      <div class="stat-card">
        <h3>Total Add-to-Cart Events</h3>
        <p class="stat-value" id="totalAddToCart">0</p>
      </div>
      <div class="stat-card">
        <h3>Products Tracked</h3>
        <p class="stat-value" id="totalProducts">0</p>
      </div>
      <div class="stat-card">
        <h3>Last Updated</h3>
        <p class="stat-value" id="lastUpdated">-</p>
      </div>
    </div>

    <div class="table-container">
      <h2>Product Rankings by Add-to-Cart</h2>
      <table id="dashboardTable" class="dashboard-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Product Name</th>
            <th>Add-to-Cart Count</th>
            <th>Percentage</th>
            <th>Total Clicks</th>
            <th>Conversion Rate (%)</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="6" class="no-data">Loading data...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
